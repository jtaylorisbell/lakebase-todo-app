# Databricks Asset Bundle configuration for Lakebase Todo App
#
# Deploy with: databricks bundle deploy -t <target>
#
# Targets:
#   - dev: Development environment
#   - prod: Production environment

bundle:
  name: lakebase-todo-app

# Include resource definitions from the resources directory
include:
  - resources/*.yml

# Workspace sync configuration
sync:
  exclude:
    - node_modules/
    - frontend/node_modules/
    - frontend/dist/
    - .venv/
    - __pycache__/
    - "*.egg-info/"
    - .env
    - .env.local
    - uv.lock

# Target environments
targets:
  dev:
    default: true
    resources:
      apps:
        todo_app:
          permissions:
            - service_principal_name: 4acb06a1-4088-41e2-ac3a-1547c840816f
              level: CAN_MANAGE
      postgres_projects:
        todo_app_project:
          permissions:
            - user_name: taylor.isbell@databricks.com
              level: CAN_MANAGE
